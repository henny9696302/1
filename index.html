<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모두의청약</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef5ff;
}

.app{
  max-width:420px;
  margin:auto;
  min-height:100vh;
}

/* 배너 */
.banner{
  display:flex;
  overflow-x:auto;
}
.banner div{
  min-width:100%;
  padding:12px;
  text-align:center;
  font-weight:bold;
}
.b1{background:#ff7a00;color:white;}
.b2{background:#ffd84d;}

.title{
  text-align:center;
  font-size:28px;
  color:#007bff;
  font-weight:bold;
  margin:15px 0;
}

.card{
  background:white;
  margin:12px;
  padding:16px;
  border-radius:16px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}
.blue{background:#007bff;color:white;}
.red{background:#ff4d4f;color:white;}

.hidden{display:none;}

.apt{
  background:#f7faff;
  padding:14px;
  border-radius:14px;
  margin:10px 0;
}
.apt.active{
  border:2px solid #007bff;
}

.big{
  text-align:center;
  font-size:30px;
  font-weight:bold;
  color:#007bff;
}
</style>
</head>

<body>

<div class="app">

<!-- 배너 -->
<div class="banner">
  <div class="b1">🥛 사나나우유 광고</div>
  <div class="b2">🏥 쏙딱 광고</div>
</div>

<!-- 로그인 -->
<div id="screen-login">
  <div class="title">모두의청약</div>
  <div class="card">
    <input id="input-id" placeholder="아이디 입력">
    <button class="btn blue" onclick="handleLogin()">로그인</button>
  </div>
</div>

<!-- 아파트 -->
<div id="screen-apt" class="hidden">
  <div class="title">아파트 선택</div>
  <div class="card" id="apt-list"></div>
  <div class="card">
    <button id="btn-next" class="btn blue hidden" onclick="goCert()">다음</button>
  </div>
</div>

<!-- 인증 -->
<div id="screen-cert" class="hidden">
  <div class="title">인증서 선택</div>
  <div class="card">
    <button class="btn blue" onclick="selectKakao()">카카오인증서</button>
    <button class="btn blue" onclick="selectNaver()">네이버인증서</button>
  </div>
</div>

<!-- 결과 -->
<div id="screen-result" class="hidden">
  <div class="title">청약 결과</div>
  <div class="card">
    <p id="text-people"></p>
    <p id="text-winners"></p>
    <button class="btn blue" onclick="showFinal()">결과보기</button>
  </div>
</div>

<!-- 당첨 -->
<div id="screen-final" class="hidden">
  <div class="big">🎉 당첨되셨습니다! 🎉</div>

  <div id="doc-area" class="hidden">
    <div class="card" onclick="downloadDoc()">
      📄 청약 당첨 서류 (터치해서 다운로드)
    </div>

    <p style="text-align:center;">
      이 서류를 지참하시고 해당 지역 구청으로 가주세요!
    </p>

    <div class="card">
      <button class="btn red" onclick="resetAll()">나가기</button>
    </div>
  </div>
</div>

</div>

<script>
let selectedApt = "";

/* 로그인 */
function handleLogin(){
  const id = document.getElementById("input-id").value;

  if(id === "욱재" || id === "정미"){
    showScreen("screen-login", false);
    showScreen("screen-apt", true);
    loadApartments();
  }else{
    alert("아이디 틀림!");
  }
}

/* 화면 전환 */
function showScreen(id, show){
  const el = document.getElementById(id);
  if(show){
    el.classList.remove("hidden");
  }else{
    el.classList.add("hidden");
  }
}

/* 아파트 */
function loadApartments(){
  const list = document.getElementById("apt-list");
  list.innerHTML = "";

  const data = [
    ["솟대 캐슬","42평"],
    ["수르지오 퀀텀","39평"],
    ["슴호어울림 5차","41평"]
  ];

  data.forEach(item=>{
    const people = Math.floor(Math.random()*100000)+100000;
    const isFull = people >= 200000;

    const div = document.createElement("div");
    div.className = "apt";

    div.innerHTML = `
      <b>${item[0]} (${item[1]})</b><br>
      신청자 ${people.toLocaleString()}명
      ${isFull ? "<br><span style='color:red'>마감</span>" : ""}
    `;

    if(!isFull){
      div.onclick = function(){
        document.querySelectorAll(".apt").forEach(el=>el.classList.remove("active"));
        div.classList.add("active");
        selectedApt = item[0];
        document.getElementById("btn-next").classList.remove("hidden");
      };
    }

    list.appendChild(div);
  });
}

/* 다음 */
function goCert(){
  showScreen("screen-apt", false);
  showScreen("screen-cert", true);
}

/* 인증 */
function selectKakao(){
  setTimeout(()=>{
    showScreen("screen-cert", false);
    showScreen("screen-result", true);

    const count = Math.floor(Math.random()*100000)+100000;
    document.getElementById("text-people").innerText =
      "신청자 수: " + count.toLocaleString();

    document.getElementById("text-winners").innerText =
      "당첨자: 이수현, 김민준, 박서연, 정미, 욱재";

  },2000);
}

function selectNaver(){
  alert("오류! 카카오인증서로 인증 부탁드립니다.");
}

/* 결과 */
function showFinal(){
  showScreen("screen-result", false);
  showScreen("screen-final", true);

  setTimeout(()=>{
    document.getElementById("doc-area").classList.remove("hidden");
  },2000);
}

/* 다운로드 */
function downloadDoc(){
  const text = "청약 당첨 서류\n아파트: " + selectedApt;
  const blob = new Blob([text], {type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "청약서류.txt";
  a.click();
}

/* 초기화 */
function resetAll(){
  location.reload();
}
</script>

</body>
</html>
